<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>STIA Certificate Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { background: #222; display: flex; flex-direction: column; align-items: center; font-family: 'Arial', sans-serif; }
        
        /* אזור התעודה */
        #diploma-canvas {
            position: relative;
            width: 1000px; height: 1000px;
            background-image: url('background.png'); /* שים לב: שם הקובץ חייב להיות זהה בתיקייה */
            background-size: cover;
            cursor: crosshair;
        }

        /* אלמנטים ניתנים לעריכה וגרירה */
        .movable { position: absolute; color: #b8860b; font-weight: bold; cursor: move; border: 1px dashed transparent; }
        .movable:hover { border: 1px dashed #b8860b; }
        
        #passport-photo { width: 140px; height: 170px; border: 2px solid #b8860b; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<div id="diploma-canvas">
    <div id="passport-photo" class="movable" style="top:350px; left:100px;"></div>
    <div class="movable" style="top:420px; left:300px; font-size: 45px;" contenteditable="true">שם הנמען</div>
    <div class="movable" style="top:520px; left:300px; font-size: 25px;" contenteditable="true">כאן נכתב פירוט ההסמכה</div>
</div>

<div style="margin-top: 20px;">
    <input type="file" id="imgLoader" style="color:white">
    <button onclick="downloadAsImage()">הורד תעודה כתמונה (PNG)</button>
</div>

<script>
    // העלאת תמונה
    document.getElementById('imgLoader').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('passport-photo').style.backgroundImage = "url("+event.target.result+")";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    // לוגיקת גרירה
    let activeEl = null;
    document.querySelectorAll('.movable').forEach(el => {
        el.onmousedown = (e) => {
            activeEl = el;
            let offsetX = e.clientX - el.offsetLeft;
            let offsetY = e.clientY - el.offsetTop;
            document.onmousemove = (e) => {
                activeEl.style.left = (e.clientX - offsetX) + 'px';
                activeEl.style.top = (e.clientY - offsetY) + 'px';
            };
            document.onmouseup = () => { document.onmousemove = null; };
        }
    });

    // יצירת תמונה להורדה
    function downloadAsImage() {
        html2canvas(document.querySelector("#diploma-canvas")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'STIA_Certificate.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
