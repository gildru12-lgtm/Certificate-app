<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל תעודות STIA</title>
    <style>
        body { display: flex; flex-direction: column; align-items: center; background: #333; }
        
        #diploma {
            position: relative;
            width: 1000px; /* גודל מותאם איכות גבוהה */
            height: 1000px;
            background-image: url('background.png'); /* שים את שם קובץ התעודה כאן */
            background-size: contain;
            background-repeat: no-repeat;
            background-position: center;
        }

        .editable { position: absolute; color: #b8860b; cursor: pointer; text-align: center; font-family: 'serif'; }
        
        #name { top: 400px; width: 100%; font-size: 50px; font-weight: bold; }
        #details { top: 520px; width: 100%; font-size: 28px; }
        
        #user-photo { 
            position: absolute; top: 400px; left: 100px; width: 150px; height: 180px; 
            border: 2px solid #b8860b; background: #eee; cursor: pointer;
        }

        .signature { position: absolute; bottom: 180px; font-family: 'cursive'; font-size: 32px; color: #b8860b; }
        #sig1 { left: 200px; }
        #sig2 { right: 200px; }
    </style>
</head>
<body>

<div id="diploma">
    <input type="file" id="photoInput" style="display:none" onchange="loadPhoto(event)">
    <div id="user-photo" onclick="document.getElementById('photoInput').click()">תמונה</div>
    
    <div id="name" class="editable" contenteditable="true">שם הנמען</div>
    <div id="details" class="editable" contenteditable="true">כאן יבוא פירוט ההסמכה</div>
    <div id="sig1" class="signature" contenteditable="true">חתימה 1</div>
    <div id="sig2" class="signature" contenteditable="true">חתימה 2</div>
</div>

<button onclick="downloadDiploma()" style="margin: 20px; padding: 15px 30px;">הורד תעודה סופית</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    function loadPhoto(event) {
        let reader = new FileReader();
        reader.onload = function(){
            document.getElementById('user-photo').style.backgroundImage = "url("+reader.result+")";
            document.getElementById('user-photo').style.backgroundSize = "cover";
            document.getElementById('user-photo').innerText = "";
        }
        reader.readAsDataURL(event.target.files[0]);
    }

    function downloadDiploma() {
        html2canvas(document.querySelector("#diploma")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'my-certificate.png';
            link.href = canvas.toDataURL("image/png", 1.0);
            link.click();
        });
    }
</script>
</body>
</html>
