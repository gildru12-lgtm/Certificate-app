<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>מחולל תעודות STIA</title>
    <style>
        body { font-family: 'Times New Roman', serif; display: flex; flex-direction: column; align-items: center; background: #f0f0f0; }
        
        /* אזור התעודה */
        #diploma {
            position: relative;
            width: 800px;
            height: 800px;
            background-image: url('certificate-bg.png'); /* שים כאן את שם הקובץ שלך */
            background-size: cover;
            margin-top: 20px;
        }

        /* עיצוב הטקסטים */
        .editable { position: absolute; color: #b8860b; cursor: pointer; }
        #name { top: 380px; width: 100%; text-align: center; font-size: 40px; font-weight: bold; }
        #requirements { top: 480px; width: 100%; text-align: center; font-size: 22px; }
        
        /* חתימות */
        .signature { position: absolute; bottom: 150px; font-family: 'cursive'; font-size: 28px; color: #555; }
        #sig1 { left: 150px; }
        #sig2 { right: 150px; }

        /* כפתור הורדה */
        button { margin-top: 20px; padding: 10px 20px; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>

<div id="diploma">
    <div id="name" class="editable" contenteditable="true">הכנס שם הנרשם</div>
    <div id="requirements" class="editable" contenteditable="true">השלים בהצלחה קורס טקטי מתקדם</div>
    <div id="sig1" class="signature" contenteditable="true">חתימה 1</div>
    <div id="sig2" class="signature" contenteditable="true">חתימה 2</div>
</div>

<button onclick="downloadDiploma()">הורד תעודה כתמונה</button>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
<script>
    function downloadDiploma() {
        html2canvas(document.querySelector("#diploma")).then(canvas => {
            let link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL();
            link.click();
        });
    }
</script>

</body>
</html>
