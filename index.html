<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIA Mobile Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #222; display: flex; flex-direction: column; align-items: center; }
        
        #diploma-canvas {
            position: relative;
            width: 95vw; height: 95vw;
            background-image: url('background.png');
            background-size: contain; background-repeat: no-repeat;
            background-position: center;
        }

        /* הגדרות חדשות: גודל מוקטן ומיקום מיושר לשם */
        #passport-photo { 
            position: absolute; 
            width: 15%; height: 20%; /* גודל פספורט קטן */
            border: 2px solid #b8860b; 
            background-size: cover; 
            background-position: center;
            top: 38%; left: 75%; /* צד ימין ליד השם */
        }

        .item { position: absolute; color: #b8860b; font-weight: bold; }
        .controls { margin-top: 15px; display: flex; gap: 10px; color: white; }
    </style>
</head>
<body>

<div id="diploma-canvas">
    <div id="passport-photo"></div>
    
    <div class="item" style="top: 40%; left: 20%; width: 50%; font-size: 5vw;" contenteditable="true">שם הנמען</div>
    <div class="item" style="top: 50%; left: 20%; width: 50%; font-size: 3vw;" contenteditable="true">פירוט ההסמכה</div>
</div>

<div class="controls">
    <input type="file" id="imgLoader">
    <button onclick="downloadAsImage()">הורד תעודה</button>
</div>

<script>
    document.getElementById('imgLoader').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('passport-photo').style.backgroundImage = "url("+event.target.result+")";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function downloadAsImage() {
        html2canvas(document.querySelector("#diploma-canvas"), {scale: 2}).then(canvas => {
            let link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
