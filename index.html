<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIA Generator Final</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        
        #diploma-canvas {
            position: relative;
            width: 95vw; height: 95vw;
            background-image: url('background.png');
            background-size: contain; background-repeat: no-repeat; background-position: center;
        }

        /* אלמנטים ניתנים להזזה */
        .movable { position: absolute; cursor: move; border: 1px dashed transparent; }
        .movable:active { border: 1px dashed #b8860b; }

        #passport-photo { 
            width: 12%; height: 16%; border: 2px solid #b8860b; 
            background-size: cover; background-position: center;
            top: 40%; left: 75%; /* הורדתי את התמונה מעט למטה וקצת שמאלה מהקצה */
        }

        .text-layer { color: #b8860b; font-weight: bold; text-align: center; width: 45%; }
    </style>
</head>
<body>

<div id="diploma-canvas">
    <div id="passport-photo" class="movable"></div>
    
    <div class="text-layer movable" style="top: 40%; left: 25%; font-size: 5vw;" contenteditable="true">שם הנמען</div>
    <div class="text-layer movable" style="top: 50%; left: 25%; font-size: 3vw;" contenteditable="true">פירוט ההסמכה</div>
</div>

<div style="margin-top: 20px; color: white;">
    <input type="file" id="imgLoader">
    <button onclick="downloadAsImage()">הורד תעודה</button>
</div>

<script>
    // העלאת תמונה
    document.getElementById('imgLoader').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('passport-photo').style.backgroundImage = "url("+event.target.result+")";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    // לוגיקת גרירה עם אצבע/עכבר
    let active = null;
    document.querySelectorAll('.movable').forEach(el => {
        el.onmousedown = el.ontouchstart = (e) => {
            active = el;
            let touch = e.touches ? e.touches[0] : e;
            let shiftX = touch.clientX - el.offsetLeft;
            let shiftY = touch.clientY - el.offsetTop;
            document.onmousemove = document.ontouchmove = (e) => {
                let t = e.touches ? e.touches[0] : e;
                active.style.left = (t.clientX - shiftX) + 'px';
                active.style.top = (t.clientY - shiftY) + 'px';
            };
            document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; };
        }
    });

    function downloadAsImage() {
        html2canvas(document.querySelector("#diploma-canvas"), {scale: 2}).then(canvas => {
            let link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
