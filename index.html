<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIA Diploma Generator</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #111; display: flex; flex-direction: column; align-items: center; }
        
        #diploma-canvas {
            position: relative;
            width: 90vw; height: 90vw;
            background-image: url('background.png');
            background-size: contain; background-repeat: no-repeat;
            background-position: center;
        }

        /* ממוקם בבטחה בצד ימין, בגודל מוקטן שלא יסתיר כלום */
        #passport-photo { 
            position: absolute; 
            width: 10%; height: 14%; 
            border: 2px solid #b8860b; 
            background-size: cover; 
            background-position: center;
            top: 36%; left: 78%; 
        }

        .text-line { 
            position: absolute; 
            color: #b8860b; 
            font-weight: bold; 
            white-space: nowrap;
        }
        
        .controls { margin-top: 20px; color: white; display: flex; gap: 10px; }
    </style>
</head>
<body>

<div id="diploma-canvas">
    <div id="passport-photo"></div>
    
    <div class="text-line" style="top: 38%; left: 22%; font-size: 5vw;" contenteditable="true">שם הנמען</div>
    <div class="text-line" style="top: 48%; left: 22%; font-size: 3vw;" contenteditable="true">פירוט ההסמכה</div>
</div>

<div class="controls">
    <input type="file" id="imgLoader">
    <button onclick="downloadAsImage()">הורד תעודה</button>
</div>

<script>
    document.getElementById('imgLoader').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('passport-photo').style.backgroundImage = "url("+event.target.result+")";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    function downloadAsImage() {
        html2canvas(document.querySelector("#diploma-canvas"), {scale: 2}).then(canvas => {
            let link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
