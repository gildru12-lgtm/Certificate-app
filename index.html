<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>STIA Ultimate Generator</title>
    <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Playfair+Display:wght@700&family=Assistant:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { margin: 0; padding: 10px; background: #111; display: flex; flex-direction: column; align-items: center; color: white; }
        #diploma-canvas { position: relative; width: 95vw; height: 95vw; background-image: url('background.png'); background-size: contain; background-repeat: no-repeat; background-position: center; }
        .movable { position: absolute; cursor: move; border: 1px dashed transparent; padding: 5px; }
        .movable:active { border: 1px dashed #fff; }
        #passport-photo { width: 12%; height: 16%; border: 2px solid #b8860b; background-size: cover; top: 35%; left: 75%; }
        .font-selector { font-size: 2vw; background: #333; color: white; border: none; }
    </style>
</head>
<body>

<div id="diploma-canvas">
    <div id="passport-photo" class="movable"></div>
    
    <div class="movable" style="top: 40%; left: 25%; width: 40%; color: #b8860b;">
        <select class="font-selector" onchange="this.parentElement.style.fontFamily = this.value">
            <option value="'Assistant', sans-serif">פונט רגיל</option>
            <option value="'Playfair Display', serif">פונט רשמי</option>
            <option value="'Dancing Script', cursive">כתב יד</option>
        </select>
        <div contenteditable="true" style="font-size: 5vw; font-weight: bold;">שם הנמען</div>
    </div>

    <div class="movable" style="top: 50%; left: 25%; width: 40%; color: #b8860b;">
        <select class="font-selector" onchange="this.parentElement.style.fontFamily = this.value">
            <option value="'Assistant', sans-serif">פונט רגיל</option>
            <option value="'Playfair Display', serif">פונט רשמי</option>
            <option value="'Dancing Script', cursive">כתב יד</option>
        </select>
        <div contenteditable="true" style="font-size: 3vw;">פירוט הסמכה</div>
    </div>

    <div class="movable" style="top: 65%; left: 30%; width: 30%; color: black;">
        <select class="font-selector" onchange="this.parentElement.style.fontFamily = this.value">
            <option value="'Dancing Script', cursive">כתב יד</option>
            <option value="'Assistant', sans-serif">פונט רגיל</option>
        </select>
        <div contenteditable="true" style="font-size: 3vw;">טקסט שחור מרכזי</div>
    </div>

    <div class="movable" style="top: 80%; left: 10%; width: 20%; color: black;">
        <select class="font-selector" onchange="this.parentElement.style.fontFamily = this.value">
            <option value="'Dancing Script', cursive">כתב יד</option>
        </select>
        <div contenteditable="true" style="font-size: 3vw;">חתימה 1</div>
    </div>

    <div class="movable" style="top: 80%; left: 70%; width: 20%; color: black;">
        <select class="font-selector" onchange="this.parentElement.style.fontFamily = this.value">
            <option value="'Dancing Script', cursive">כתב יד</option>
        </select>
        <div contenteditable="true" style="font-size: 3vw;">חתימה 2</div>
    </div>
</div>

<div style="margin-top: 20px;">
    <input type="file" id="imgLoader">
    <button onclick="downloadAsImage()">הורד תעודה</button>
</div>

<script>
    document.getElementById('imgLoader').onchange = function(e) {
        let reader = new FileReader();
        reader.onload = function(event) {
            document.getElementById('passport-photo').style.backgroundImage = "url("+reader.result+")";
        }
        reader.readAsDataURL(e.target.files[0]);
    }

    let active = null;
    document.querySelectorAll('.movable').forEach(el => {
        el.onmousedown = el.ontouchstart = (e) => {
            active = el;
            let touch = e.touches ? e.touches[0] : e;
            let shiftX = touch.clientX - el.offsetLeft;
            let shiftY = touch.clientY - el.offsetTop;
            document.onmousemove = document.ontouchmove = (e) => {
                let t = e.touches ? e.touches[0] : e;
                active.style.left = (t.clientX - shiftX) + 'px';
                active.style.top = (t.clientY - shiftY) + 'px';
            };
            document.onmouseup = document.ontouchend = () => { document.onmousemove = document.ontouchmove = null; };
        }
    });

    function downloadAsImage() {
        html2canvas(document.querySelector("#diploma-canvas"), {scale: 2}).then(canvas => {
            let link = document.createElement('a');
            link.download = 'certificate.png';
            link.href = canvas.toDataURL("image/png");
            link.click();
        });
    }
</script>
</body>
</html>
